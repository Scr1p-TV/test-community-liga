<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <title>UFL Card — Vorlage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #020817;
      font-family: Arial, sans-serif;
      gap: 24px;
    }

    .hint {
      color: rgba(255,255,255,.35);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .hint strong { color: #facc15; }

    /* ══════════════════════════
       EXACT DESIGN FROM SPEC
    ══════════════════════════ */

    .ufl-card {
      position: relative;
      width: 420px;
      height: 720px;
      border-radius: 38px;
      overflow: hidden;

      background:
        linear-gradient(160deg, #071226 0%, #0f1f3d 45%, #08111f 100%);

      border: 3px solid rgba(90,180,255,.45);

      box-shadow:
        0 0 25px rgba(0,140,255,.35),
        0 0 80px rgba(0,180,255,.25);
    }

    .ufl-card::before {
      content: '';
      position: absolute;
      inset: 0;

      background:
        linear-gradient(135deg, transparent 20%, rgba(0,180,255,.12) 50%, transparent 80%);

      z-index: 1;
    }

    .card-glow {
      position: absolute;
      inset: -40%;

      background: radial-gradient(circle, rgba(0,180,255,.22), transparent 70%);

      animation: spin 10s linear infinite;

      z-index: 0;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .league-logo {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);

      width: 150px;

      z-index: 5;

      filter: drop-shadow(0 0 12px rgba(0,180,255,.5));
    }

    .player-image {
      position: absolute;
      bottom: 170px;
      left: 50%;

      transform: translateX(-50%);

      width: 360px;

      z-index: 4;

      object-fit: contain;

      filter: drop-shadow(0 0 18px rgba(0,180,255,.35));
    }

    .bottom-panel {
      position: absolute;
      bottom: 0;
      width: 100%;

      padding: 24px;

      z-index: 6;

      background: linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.1));

      backdrop-filter: blur(10px);
    }

    .bottom-panel h2 {
      margin: 0 0 24px;

      text-align: center;

      color: #fff;

      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 52px;
      font-weight: 900;

      letter-spacing: 4px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .meta-item {
      flex: 1;

      background: rgba(255,255,255,.04);

      border: 1px solid rgba(255,255,255,.08);

      border-radius: 16px;

      padding: 14px 10px;

      text-align: center;

      backdrop-filter: blur(6px);
    }

    .meta-item img {
      width: 54px;
      height: 54px;

      object-fit: contain;

      margin-bottom: 10px;
    }

    /* Position badge (no image, just text) */
    .meta-item .pos-icon {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      background: rgba(250,204,21,.12);
      border: 1px solid rgba(250,204,21,.35);
      border-radius: 12px;
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 28px;
      color: #facc15;
    }

    .meta-item span {
      display: block;

      color: #fff;

      font-size: 14px;
      font-weight: 700;

      letter-spacing: 1px;
    }

    .ufl-card:hover {
      transform: translateY(-8px) scale(1.02);

      transition: .35s ease;

      box-shadow:
        0 0 40px rgba(0,180,255,.45),
        0 0 100px rgba(0,180,255,.3);
    }
  </style>
</head>
<body>

  <div class="hint">
    Screenshot: <strong>Win+Shift+S</strong> / <strong>Cmd+Shift+4</strong>
  </div>

  <div class="ufl-card">
    <div class="card-glow"></div>

    <!-- Liga Logo — ersetze src mit deinem uflcommunityliga.png -->
    <img
      class="league-logo"
      src="https://upload.wikimedia.org/wikipedia/de/thumb/0/04/UFL_video_game_logo.png/240px-UFL_video_game_logo.png"
      alt="UFL Community Liga"
      onerror="this.style.opacity='.4'"
    />

    <!-- Spieler Foto -->
    <img
      class="player-image"
      src="https://cdn.futwiz.com/assets/img/fc25/players/231747.png"
      alt="Mbappé"
      onerror="this.src='https://cdn.sofifa.net/players/notfound_0_120.png'"
    />

    <div class="bottom-panel">
      <h2>MBAPPÉ</h2>

      <div class="meta">

        <!-- Nation -->
        <div class="meta-item">
          <img
            src="https://flagcdn.com/w80/fr.png"
            alt="Frankreich"
            onerror="this.style.opacity='.3'"
          />
          <span>FRANKREICH</span>
        </div>

        <!-- Liga -->
        <div class="meta-item">
          <img
            src="https://flagcdn.com/w80/es.png"
            alt="Spanien 1"
            onerror="this.style.opacity='.3'"
          />
          <span>SPANIEN 1</span>
        </div>

        <!-- Position -->
        <div class="meta-item">
          <div class="pos-icon">ST</div>
          <span>POSITION</span>
        </div>

      </div>
    </div>
  </div>

  <div class="hint" style="font-size:11px">
    420 × 720px &nbsp;·&nbsp; Ersetze das Liga-Logo oben mit deinem <strong>uflcommunityliga.png</strong>
  </div>

</body>
</html>
