<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFL Community Draft</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <h1>UFL Community Draft</h1>
    <div id="timer">90</div>
  </header>

  <main>
    <section class="panel">
      <h2>Draft Board</h2>
      <table>
        <thead>
          <tr>
            <th>Pick</th>
            <th>Team</th>
            <th>Spieler</th>
          </tr>
        </thead>
        <tbody id="draftBoard"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Verfügbare Spieler</h2>
      <div id="players"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
