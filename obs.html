<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <title>UFL Draft – OBS Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: transparent;
      font-family: 'Inter', sans-serif;
      color: white;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      position: relative;
    }

    /* ════════════════════════════════
       TOP BAR
    ════════════════════════════════ */
    #topBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 72px;
      background: linear-gradient(90deg, rgba(8,14,26,0.96) 0%, rgba(15,25,41,0.92) 70%, transparent 100%);
      border-bottom: 2px solid rgba(250,204,21,0.5);
      display: flex;
      align-items: center;
      padding: 0 30px;
      gap: 30px;
      z-index: 10;
    }

    .obs-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 5px;
      color: white;
      flex-shrink: 0;
    }
    .obs-logo span { color: #facc15; }

    .obs-phase-badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 20px;
      flex-shrink: 0;
    }
    .obs-phase-badge.secure { background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.4); }
    .obs-phase-badge.ban    { background: rgba(249,115,22,0.2);  color: #f97316; border: 1px solid rgba(249,115,22,0.4); }
    .obs-phase-badge.draft  { background: rgba(250,204,21,0.2);  color: #facc15; border: 1px solid rgba(250,204,21,0.4); }
    .obs-phase-badge.done   { background: rgba(34,197,94,0.2);   color: #22c55e; border: 1px solid rgba(34,197,94,0.4); }

    #obsCurrentPick {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #64748b;
      line-height: 1.4;
    }
    #obsOnTheClock {
      font-size: 20px;
      font-weight: 700;
      color: #facc15;
    }

    .obs-timer-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #obsTimer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      color: white;
      min-width: 75px;
      text-align: right;
      transition: color 0.3s;
    }
    #obsTimer.urgent { color: #ef4444; animation: pulse 0.5s infinite alternate; }
    @keyframes pulse { from { opacity:1; } to { opacity:0.3; } }
    .obs-timer-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: #64748b; text-transform: uppercase; }

    /* ════════════════════════════════
       BOTTOM TICKER
    ════════════════════════════════ */
    #bottomBar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 54px;
      background: linear-gradient(90deg, rgba(8,14,26,0.96) 0%, rgba(15,25,41,0.9) 100%);
      border-top: 2px solid rgba(250,204,21,0.35);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 10;
    }
    .ticker-label {
      flex-shrink: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: #facc15;
      padding: 0 20px;
      border-right: 1px solid rgba(255,255,255,0.12);
      height: 100%;
      display: flex;
      align-items: center;
    }
    #tickerTrack {
      display: flex;
      gap: 0;
      animation: tickerScroll 40s linear infinite;
      white-space: nowrap;
    }
    @keyframes tickerScroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 28px;
      font-size: 14px;
      font-weight: 600;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .ticker-item .t-icon  { font-size: 13px; }
    .ticker-item .t-team  { color: #94a3b8; }
    .ticker-item .t-arrow { color: #475569; }
    .ticker-item .t-player { color: white; }
    .ticker-item.secure .t-icon { color: #a78bfa; }
    .ticker-item.ban    .t-icon { color: #f97316; }
    .ticker-item.draft  .t-icon { color: #facc15; }

    /* ════════════════════════════════
       RESULTS PANEL — right side
    ════════════════════════════════ */
    #resultsPanel {
      position: absolute;
      top: 82px;
      right: 24px;
      width: 460px;
      bottom: 64px;
      background: rgba(8,14,26,0.88);
      border: 1px solid rgba(250,204,21,0.25);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      overflow-y: auto;
      padding: 16px;
      z-index: 5;
    }
    .results-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: #facc15;
      border-bottom: 1px solid rgba(250,204,21,0.2);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .team-block {
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

    .team-header {
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .team-header .team-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #facc15;
      flex-shrink: 0;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .team-row .row-icon  { font-size: 13px; width: 18px; flex-shrink: 0; }
    .team-row .row-type  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; width: 48px; flex-shrink: 0; }
    .team-row .row-player { font-weight: 600; flex: 1; }
    .team-row.type-secure { background: rgba(167,139,250,0.06); }
    .team-row.type-ban    { background: rgba(249,115,22,0.06); }
    .team-row.type-draft  { background: rgba(250,204,21,0.04); }
    .team-row.type-secure .row-type  { color: #a78bfa; }
    .team-row.type-ban    .row-type  { color: #f97316; }
    .team-row.type-draft  .row-type  { color: #facc15; }
    .team-row.empty .row-player { color: #475569; font-style: italic; }

    /* ════════════════════════════════
       RECENT PICKS — left side
    ════════════════════════════════ */
    #recentPanel {
      position: absolute;
      top: 82px;
      left: 24px;
      width: 300px;
      background: rgba(8,14,26,0.82);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      overflow: hidden;
      z-index: 5;
    }
    .recent-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      color: #64748b;
      padding: 12px 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      animation: slideIn 0.4s ease;
    }
    .recent-icon { font-size: 14px; flex-shrink: 0; }
    .recent-info { flex: 1; }
    .recent-player { font-weight: 700; font-size: 14px; }
    .recent-team   { font-size: 11px; color: #64748b; margin-top: 1px; }
    .recent-type   { font-family: 'Bebas Neue', sans-serif; font-size: 16px; flex-shrink: 0; }
    .recent-type.secure { color: #a78bfa; }
    .recent-type.ban    { color: #f97316; }
    .recent-type.draft  { color: #facc15; }

    /* ════════════════════════════════
       PICK FLASH
    ════════════════════════════════ */
    #pickFlash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: linear-gradient(135deg, #080e1a 0%, #0f1929 100%);
      border: 3px solid #facc15;
      border-radius: 20px;
      padding: 44px 70px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 100px rgba(250,204,21,0.35);
      z-index: 20;
    }
    #pickFlash.active { opacity:1; transform:translate(-50%,-50%) scale(1); }
    #pickFlash.type-ban    { border-color: #f97316; box-shadow: 0 0 100px rgba(249,115,22,0.35); }
    #pickFlash.type-secure { border-color: #a78bfa; box-shadow: 0 0 100px rgba(167,139,250,0.35); }

    .flash-badge  { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:5px; color:#facc15; margin-bottom:10px; }
    .flash-team   { font-size:17px; color:#94a3b8; font-weight:600; margin-bottom:6px; }
    .flash-player { font-family:'Bebas Neue',sans-serif; font-size:70px; letter-spacing:2px; color:white; line-height:1; }
    #pickFlash.type-ban    .flash-badge { color:#f97316; }
    #pickFlash.type-secure .flash-badge { color:#a78bfa; }

    #audioActivate {
      position: absolute;
      bottom: 64px; left: 24px;
      z-index: 50;
    }
    #audioActivate button {
      background: rgba(250,204,21,0.15);
      border: 1px solid rgba(250,204,21,0.4);
      color: #facc15;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #audioActivate button:hover { background: rgba(250,204,21,0.3); }
    #audioActivate.hidden { display: none; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topBar">
    <div class="obs-logo">UFL<span>DRAFT</span></div>
    <div id="obsPhaseBadge" class="obs-phase-badge draft">DRAFT</div>
    <div>
      <div id="obsCurrentPick">Runde <span id="obsRound">—</span> &middot; Pick <span id="obsPickNum">—</span></div>
      <div id="obsOnTheClock">On the Clock: <span id="obsTeam">—</span></div>
    </div>
    <div class="obs-timer-wrap">
      <div id="obsTimer">—</div>
      <div class="obs-timer-label">Sek.</div>
    </div>
  </div>

  <!-- RECENT PICKS LEFT -->
  <div id="recentPanel">
    <div class="recent-title">ZULETZT</div>
    <div id="recentItems"></div>
  </div>

  <!-- RESULTS PANEL RIGHT -->
  <div id="resultsPanel">
    <div class="results-title">TEAM ÜBERSICHT</div>
    <div id="teamBlocks"></div>
  </div>

  <!-- BOTTOM TICKER -->
  <div id="bottomBar">
    <div class="ticker-label">LIVE</div>
    <div id="tickerTrack"></div>
  </div>

  <!-- AUDIO ACTIVATE BUTTON (click once in OBS to enable speech) -->
  <div id="audioActivate">
    <button onclick="activateAudio()">🔊 Audio aktivieren</button>
  </div>

  <!-- PICK FLASH -->
  <div id="pickFlash">
    <div class="flash-badge" id="flashBadge">PICK 1</div>
    <div class="flash-team"  id="flashTeam"></div>
    <div class="flash-player" id="flashPlayer"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── State ──
    let teams        = [];
    let securePicks  = {};   // team -> player
    let banPicks     = {};   // team -> player
    let draftPicks   = {};   // team -> [players]
    let lastTotal    = 0;

    // ── Phase labels ──
    const PHASE_LABELS = {
      securePick: { text: "SECURE PICK", cls: "secure" },
      ban:        { text: "BAN PHASE",   cls: "ban"    },
      draft:      { text: "DRAFT",       cls: "draft"  }
    };

    // ── Firebase: config ──
    onValue(ref(db, "draftConfig"), snap => {
      const c = snap.val();
      if (!c) return;
      teams = (c.teams || []).map(t => t.name);
      renderTeamBlocks();
    });

    // ── Firebase: state (timer, phase, on the clock) ──
    onValue(ref(db, "draftState"), snap => {
      const state = snap.val();
      if (!state) return;

      // Phase badge
      const phase = state.phase || "draft";
      const pl    = PHASE_LABELS[phase] || PHASE_LABELS.draft;
      const badge = document.getElementById("obsPhaseBadge");
      badge.textContent = pl.text;
      badge.className   = "obs-phase-badge " + pl.cls;

      // Timer
      const t       = state.timerValue ?? "—";
      const timerEl = document.getElementById("obsTimer");
      timerEl.textContent = t;
      timerEl.classList.toggle("urgent", typeof t === "number" && t <= 10);

      // Pick info
      const numTeams = state.numTeams || 1;
      if (state.currentPick) {
        const round = Math.ceil(state.currentPick / numTeams);
        document.getElementById("obsRound").textContent   = round;
        document.getElementById("obsPickNum").textContent = state.currentPick;
      } else {
        document.getElementById("obsRound").textContent   = "—";
        document.getElementById("obsPickNum").textContent = "—";
      }
      document.getElementById("obsTeam").textContent = state.onTheClock || "—";
    });

    // securePicks and banPicks listeners are defined in the ANNOUNCEMENTS section below

    // ── Firebase: draft picks ──
    let lastDraftCount = 0;
    onValue(ref(db, "draftPicks"), snap => {
      const data = snap.val() || {};
      draftPicks = {};
      const all  = Object.values(data).map((p, i) => ({ ...p, num: i + 1 }));

      all.forEach(p => {
        if (!draftPicks[p.team]) draftPicks[p.team] = [];
        draftPicks[p.team].push(p.player);
      });

      // New pick animation + announcement
      if (all.length > lastDraftCount && lastDraftCount >= 0) {
        const newest = all[all.length - 1];
        if (newest) {
          showFlash("PICK " + newest.num, newest.team, newest.player, "type-draft");
          // NFL-style announcement
          const announcement =
            "Mit dem " + ordinal(newest.num) + " Pick — " +
            newest.team + " — " +
            newest.player;
          speak(announcement);
        }
      }
      lastDraftCount = all.length;

      renderTeamBlocks();
      renderRecent(all, "draft");
      rebuildTicker();
    });

    // ── TEAM BLOCKS (results panel) ──
    function renderTeamBlocks() {
      const el = document.getElementById("teamBlocks");
      if (!el || teams.length === 0) return;
      el.innerHTML = "";

      teams.forEach(team => {
        const block = document.createElement("div");
        block.className = "team-block";

        // Header
        const header = document.createElement("div");
        header.className = "team-header";
        const dot = document.createElement("div"); dot.className = "team-dot";
        const nameEl = document.createElement("span"); nameEl.textContent = team;
        header.appendChild(dot); header.appendChild(nameEl);
        block.appendChild(header);

        // Secure pick row
        const secRow = makeRow("🔒", "SECURE", securePicks[team] || null, "type-secure");
        block.appendChild(secRow);

        // Ban row
        const banRow = makeRow("🚫", "BAN", banPicks[team] || null, "type-ban");
        block.appendChild(banRow);

        // Draft pick rows
        const picks = draftPicks[team] || [];
        if (picks.length > 0) {
          picks.forEach((player, i) => {
            const draftRow = makeRow("🏆", "PICK " + (i + 1), player, "type-draft");
            block.appendChild(draftRow);
          });
        } else {
          const draftRow = makeRow("🏆", "PICK", null, "type-draft");
          block.appendChild(draftRow);
        }

        el.appendChild(block);
      });
    }

    function makeRow(icon, typeLabel, player, typeClass) {
      const row = document.createElement("div");
      row.className = "team-row " + typeClass + (player ? "" : " empty");
      const iconEl   = document.createElement("span"); iconEl.className = "row-icon";   iconEl.textContent = icon;
      const typeEl   = document.createElement("span"); typeEl.className = "row-type";   typeEl.textContent = typeLabel;
      const playerEl = document.createElement("span"); playerEl.className = "row-player"; playerEl.textContent = player || "Ausstehend...";
      row.appendChild(iconEl); row.appendChild(typeEl); row.appendChild(playerEl);
      return row;
    }

    // ── RECENT ITEMS ──
    function renderRecent(draftAll, type) {
      const el = document.getElementById("recentItems");
      if (!el) return;

      // Merge all events into a unified recent list
      const events = [];

      Object.entries(securePicks).forEach(([team, player]) => {
        events.push({ type: "secure", icon: "🔒", team, player, typeLabel: "SECURE" });
      });
      Object.entries(banPicks).forEach(([team, player]) => {
        events.push({ type: "ban", icon: "🚫", team, player, typeLabel: "BAN" });
      });
      draftAll.forEach(p => {
        events.push({ type: "draft", icon: "🏆", team: p.team, player: p.player, typeLabel: "PICK " + p.num });
      });

      // Show last 7
      const recent = events.slice(-7).reverse();
      el.innerHTML = "";
      recent.forEach(e => {
        const item = document.createElement("div"); item.className = "recent-item";
        const iconEl   = document.createElement("div"); iconEl.className = "recent-icon"; iconEl.textContent = e.icon;
        const infoEl   = document.createElement("div"); infoEl.className = "recent-info";
        const playerEl = document.createElement("div"); playerEl.className = "recent-player"; playerEl.textContent = e.player;
        const teamEl   = document.createElement("div"); teamEl.className = "recent-team"; teamEl.textContent = e.team;
        infoEl.appendChild(playerEl); infoEl.appendChild(teamEl);
        const typeEl = document.createElement("div"); typeEl.className = "recent-type " + e.type; typeEl.textContent = e.typeLabel;
        item.appendChild(iconEl); item.appendChild(infoEl); item.appendChild(typeEl);
        el.appendChild(item);
      });
    }

    // ── TICKER ──
    function rebuildTicker() {
      const events = [];
      Object.entries(securePicks).forEach(([team, player]) => {
        events.push({ cls: "secure", icon: "🔒", team, player });
      });
      Object.entries(banPicks).forEach(([team, player]) => {
        events.push({ cls: "ban", icon: "🚫", team, player });
      });
      Object.values(draftPicks).forEach((picks, ti) => {
        picks.forEach(player => {
          events.push({ cls: "draft", icon: "🏆", team: teams[ti] || "?", player });
        });
      });

      if (events.length === 0) {
        document.getElementById("tickerTrack").innerHTML =
          '<span class="ticker-item"><span class="t-player">Noch keine Picks...</span></span>';
        return;
      }

      // Double for infinite scroll
      const doubled = [...events, ...events];
      document.getElementById("tickerTrack").innerHTML = doubled.map(e =>
        `<span class="ticker-item ${e.cls}">
          <span class="t-icon">${e.icon}</span>
          <span class="t-team">${e.team}</span>
          <span class="t-arrow">→</span>
          <span class="t-player">${e.player}</span>
        </span>`
      ).join("");
    }

    // ── SPEECH ──
    let audioEnabled = false;
    let speechQueue  = [];
    let isSpeaking   = false;

    // ── OBS AUDIO UNLOCK ──
    // OBS 28+ supports "Allow autoplay" in browser source settings.
    // We also try multiple unlock strategies for older OBS versions.

    function tryUnlockAudio() {
      if (audioEnabled) return;

      // Strategy 1: AudioContext unlock (works in OBS without click)
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === "suspended") {
          ctx.resume();
        }
      } catch(e) {}

      // Strategy 2: Silent speech utterance
      if (window.speechSynthesis) {
        const unlock = new SpeechSynthesisUtterance(" ");
        unlock.volume = 0;
        unlock.lang = "de-DE";
        window.speechSynthesis.speak(unlock);
        unlock.onend = function() {
          audioEnabled = true;
          document.getElementById("audioActivate").classList.add("hidden");
          console.log("Audio unlocked via speech");
          processQueue();
        };
        unlock.onerror = function() {
          // Will retry on click
        };
      }
    }

    // Try unlock immediately on page load (works if OBS "Allow autoplay" is enabled)
    window.addEventListener("load", function() {
      setTimeout(tryUnlockAudio, 1000);
    });

    // Also unlock on any interaction
    document.addEventListener("click", function() {
      if (!audioEnabled) {
        audioEnabled = true;
        document.getElementById("audioActivate").classList.add("hidden");
        speak("Audio aktiviert.");
      }
    }, { once: true });

    window.activateAudio = function() {
      audioEnabled = true;
      document.getElementById("audioActivate").classList.add("hidden");
      const unlock = new SpeechSynthesisUtterance("Audio aktiviert. Bereit für den Draft.");
      unlock.lang = "de-DE";
      window.speechSynthesis.speak(unlock);
    };

    // Pre-load German voices
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.addEventListener("voiceschanged", function() {
        window.speechSynthesis.getVoices();
        // Retry unlock after voices load
        if (!audioEnabled) tryUnlockAudio();
      });
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      if (!audioEnabled) {
        // Queue it anyway — will play once unlocked
        speechQueue.push(text);
        return;
      }
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      speechQueue.push(text);
      processQueue();
    }

    function processQueue() {
      if (isSpeaking || speechQueue.length === 0) return;
      if (!audioEnabled) return;
      isSpeaking = true;
      const text = speechQueue.shift();
      const utt  = new SpeechSynthesisUtterance(text);
      utt.lang   = "de-DE";
      utt.rate   = 0.88;
      utt.pitch  = 1.0;
      utt.volume = 1.0;

      const voices = window.speechSynthesis.getVoices();
      const german = voices.find(v => v.lang === "de-DE" && v.localService) ||
                     voices.find(v => v.lang === "de-DE") ||
                     voices.find(v => v.lang && v.lang.startsWith("de"));
      if (german) utt.voice = german;

      const watchdog = setTimeout(function() {
        if (isSpeaking) {
          window.speechSynthesis.cancel();
          isSpeaking = false;
          processQueue();
        }
      }, 10000);

      utt.onend = utt.onerror = function() {
        clearTimeout(watchdog);
        isSpeaking = false;
        setTimeout(processQueue, 300);
      };

      window.speechSynthesis.speak(utt);
    }

    // Ordinal helper
    function ordinal(n) {
      if (n === 1) return "ersten";
      if (n === 2) return "zweiten";
      if (n === 3) return "dritten";
      return n + "ten";
    }

    // ── PICK FLASH ──
    function showFlash(badge, team, player, typeClass) {
      const el = document.getElementById("pickFlash");
      document.getElementById("flashBadge").textContent  = badge;
      document.getElementById("flashTeam").textContent   = team;
      document.getElementById("flashPlayer").textContent = player;
      el.className = "active " + typeClass;
      setTimeout(() => { el.classList.remove("active"); }, 3500);
    }

    // ── ANNOUNCEMENTS ──
    // Called after showFlash for each type

    let lastSecureCount = 0;
    let lastBanCount    = 0;

    // Override secure picks listener to add announcement
    onValue(ref(db, "securePicks"), snap => {
      const data  = snap.val() || {};
      const picks = Object.values(data);
      securePicks = {};
      picks.forEach(p => { securePicks[p.team] = p.player; });

      if (picks.length > lastSecureCount && lastSecureCount >= 0) {
        const newest = picks[picks.length - 1];
        if (newest) {
          showFlash("🔒 SECURE PICK", newest.team, newest.player, "type-secure");
          speak(newest.team + " sichert sich " + newest.player);
        }
      }
      lastSecureCount = picks.length;
      renderTeamBlocks();
      rebuildTicker();
    });

    // Override ban picks listener to add announcement
    onValue(ref(db, "banPicks"), snap => {
      const data = snap.val() || {};
      const bans = Object.values(data).map((b, i) => ({ ...b, num: i + 1 }));
      banPicks = {};
      bans.forEach(b => { banPicks[b.team] = b.player; });

      if (bans.length > lastBanCount && lastBanCount >= 0) {
        const newest = bans[bans.length - 1];
        if (newest) {
          showFlash("🚫 BAN " + newest.num, newest.team, newest.player, "type-ban");
          speak(newest.team + " bannt " + newest.player);
        }
      }
      lastBanCount = bans.length;
      renderTeamBlocks();
      rebuildTicker();
    });
  </script>
</body>
