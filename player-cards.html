<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UFL Community Draft — Spielerkarten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: #080f1a;
      color: #e0e8f0;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 32px;
      background: #0d1b2e;
      border-bottom: 2px solid rgba(232,200,74,0.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-wrap { display: flex; align-items: center; gap: 14px; }
    .logo-img { width: 50px; height: 50px; object-fit: contain; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: #fff; line-height: 1; }
    .logo-text span { color: #e8c84a; }
    .logo-sub { font-size: 10px; font-weight: 600; letter-spacing: 3px; color: rgba(232,200,74,0.55); text-transform: uppercase; margin-top: 2px; }
    .topbar-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.1); }
    .topbar-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: rgba(255,255,255,0.3); }

    .topbar-controls { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; opacity: 0.35; pointer-events: none; }
    .search-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      padding: 8px 14px 8px 34px;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.22); }
    .search-input:focus { border-color: rgba(232,200,74,0.45); }

    .filter-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
    }
    .filter-select option { background: #1a2a40; }

    /* ── STATS BAR ── */
    .statsbar {
      padding: 8px 32px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      display: flex;
      gap: 16px;
    }
    .statsbar strong { color: #e8c84a; }

    /* ── GRID ── */
    .main { padding: 24px 32px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
      gap: 18px;
    }

    /* ── THE CARD ── */
    .player-card {
      position: relative;
      border-radius: 12px;
      aspect-ratio: 0.69;
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s;
      overflow: hidden;
      background: linear-gradient(170deg, #162336 0%, #0e1a2b 55%, #0b1520 100%);
      border: 1px solid rgba(232,200,74,0.2);
    }
    .player-card:hover {
      transform: translateY(-7px) scale(1.025);
      box-shadow: 0 20px 50px rgba(0,0,0,0.65), 0 0 24px rgba(232,200,74,0.12);
      z-index: 5;
      border-color: rgba(232,200,74,0.4);
    }
    .player-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 4;
    }

    .card-topleft {
      position: absolute;
      top: 10px; left: 12px;
      z-index: 3;
      text-align: center;
    }
    .card-pos {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(232,200,74,0.75);
    }

    .card-topright {
      position: absolute;
      top: 10px; right: 11px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .card-ufl-logo { width: 28px; height: 28px; object-fit: contain; opacity: 0.85; }
    .card-flag { width: 26px; height: 17px; object-fit: cover; border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }

    .card-photo-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }
    .card-photo {
      width: 100%;
      height: 88%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .card-photo-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, #0e1a2b 0%, transparent 100%);
      z-index: 2;
    }
    .card-photo-placeholder {
      width: 100%;
      height: 88%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .silhouette { width: 62%; opacity: 0.08; }

    .card-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 0 10px 10px;
      text-align: center;
    }
    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,200,74,0.3), transparent);
      margin-bottom: 7px;
    }
    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }
    .card-club {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(232,200,74,0.5);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-stats { display: flex; justify-content: space-around; margin-top: 6px; }
    .stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; color: #fff; line-height: 1; }
    .stat-lbl { font-size: 8px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.3); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: linear-gradient(160deg, #111e30 0%, #0d1824 100%);
      border: 1px solid rgba(232,200,74,0.2);
      border-radius: 18px;
      width: 640px;
      max-width: 94vw;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      transform: translateY(16px) scale(0.96);
      transition: transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; color: rgba(255,255,255,0.5);
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; transition: all 0.15s; z-index: 5;
    }
    .modal-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

    .modal-body { display: flex; }

    .modal-left {
      width: 210px; flex-shrink: 0;
      padding: 24px 18px;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column; align-items: center;
    }
    .modal-card {
      width: 160px;
      aspect-ratio: 0.69;
      border-radius: 11px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(170deg, #162336 0%, #0e1a2b 55%, #0b1520 100%);
      border: 1px solid rgba(232,200,74,0.25);
    }

    .modal-right { flex: 1; padding: 28px 22px 24px; }
    .modal-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 28px;
      text-transform: uppercase; letter-spacing: 1px;
      color: #fff; line-height: 1;
    }
    .modal-sub { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin: 4px 0 18px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 16px; }
    .info-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 10px 12px;
    }
    .info-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 4px; }
    .info-val { font-size: 14px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 7px; }
    .info-flag { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; }

    .modal-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .modal-stat { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 9px; padding: 10px; text-align: center; }
    .modal-stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 24px; color: #e8c84a; line-height: 1; }
    .modal-stat-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-top: 3px; }

    .modal-ufl-row {
      display: flex; align-items: center; gap: 10px;
      margin-top: 14px; padding: 11px 14px;
      border: 1px solid rgba(232,200,74,0.18);
      border-radius: 9px;
      background: rgba(232,200,74,0.05);
    }
    .modal-ufl-logo { width: 34px; height: 34px; object-fit: contain; }
    .modal-ufl-text { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(232,200,74,0.6); line-height: 1.5; }
    .modal-ufl-text strong { display: block; font-size: 13px; color: #e8c84a; }

    .no-results { grid-column: 1/-1; text-align: center; padding: 70px; color: rgba(255,255,255,0.2); }
    .no-results h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; margin-bottom: 8px; }
    .loading { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 80px; color: rgba(255,255,255,0.3); }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(232,200,74,0.12); border-top-color: #e8c84a; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: rgba(232,200,74,0.18); border-radius: 3px; }

    @media (max-width: 700px) {
      .topbar { padding: 10px 16px; flex-wrap: wrap; }
      .topbar-controls { margin-left: 0; width: 100%; flex-wrap: wrap; }
      .search-input { width: 100%; }
      .main { padding: 14px; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; }
      .modal-body { flex-direction: column; }
      .modal-left { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo-wrap">
    <img src="Logo.png" alt="UFL" class="logo-img" onerror="this.style.display='none'"/>
    <div>
      <div class="logo-text">UFL<span>DRAFT</span></div>
      <div class="logo-sub">Community Liga</div>
    </div>
  </div>
  <div class="topbar-divider"></div>
  <div class="topbar-title">SPIELER KARTEN</div>
  <div class="topbar-controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Spieler suchen…" oninput="filterCards()"/>
    </div>
    <select id="posFilter" class="filter-select" onchange="filterCards()">
      <option value="">Alle Positionen</option>
      <option>GK</option><option>CB</option><option>LB</option><option>RB</option>
      <option>CDM</option><option>CM</option><option>CAM</option>
      <option>LW</option><option>RW</option><option>ST</option><option>CF</option>
    </select>
  </div>
</div>

<div class="statsbar">
  <span><strong id="visibleCount">—</strong> Spieler angezeigt</span>
  <span>·</span>
  <span><strong id="totalCount">—</strong> Gesamt</span>
</div>

<div class="main">
  <div id="cardsGrid" class="cards-grid">
    <div class="loading"><div class="spinner"></div><span>Spieler werden geladen…</span></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script type="module">
import { DEFAULT_PLAYERS } from "./players.js";

const POSITIONS = ["GK","CB","CB","LB","RB","CDM","CM","CM","CAM","LW","RW","ST","ST","CF"];
const NATIONS = [
  {name:"Deutschland",code:"de"},{name:"Frankreich",code:"fr"},{name:"Spanien",code:"es"},
  {name:"Brasilien",code:"br"},{name:"Argentinien",code:"ar"},{name:"England",code:"gb-eng"},
  {name:"Portugal",code:"pt"},{name:"Italien",code:"it"},{name:"Niederlande",code:"nl"},
  {name:"Belgien",code:"be"},{name:"Kroatien",code:"hr"},{name:"Polen",code:"pl"},
  {name:"Senegal",code:"sn"},{name:"Marokko",code:"ma"},{name:"Uruguay",code:"uy"},
  {name:"Kolumbien",code:"co"},{name:"USA",code:"us"},{name:"Japan",code:"jp"},
  {name:"Österreich",code:"at"},{name:"Schweiz",code:"ch"},{name:"Dänemark",code:"dk"},
  {name:"Schweden",code:"se"},{name:"Norwegen",code:"no"},{name:"Serbien",code:"rs"},
  {name:"Türkei",code:"tr"},{name:"Elfenbeinküste",code:"ci"},{name:"Nigeria",code:"ng"},
  {name:"Ghana",code:"gh"},{name:"Kamerun",code:"cm"},{name:"Algerien",code:"dz"},
];
const LEAGUES = [
  "Premier League","La Liga","Bundesliga","Serie A","Ligue 1",
  "Eredivisie","Primeira Liga","MLS","Süper Lig","Pro League",
];
const CLUBS = [
  "FC Barcelona","Real Madrid","Bayern München","Manchester City","Paris SG",
  "Liverpool","Chelsea","Arsenal","Atletico Madrid","Juventus",
  "Inter Milan","AC Milan","Borussia Dortmund","RB Leipzig","Ajax",
  "Porto","Benfica","Sporting CP","Sevilla","Valencia",
  "Napoli","Roma","Lazio","Fiorentina","Atalanta",
  "Leicester City","Tottenham","Manchester Utd","West Ham","Newcastle",
  "Lyon","Marseille","Monaco","Lille","Nice",
  "Bayer Leverkusen","Wolfsburg","Gladbach","Frankfurt","Freiburg",
];
const STAT_KEYS = ["PAC","SHO","PAS","DRI","DEF","PHY"];

function hash(s) {
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
  return h;
}
function pick(s, arr, salt=0) { return arr[((hash(s+salt) % arr.length) + arr.length) % arr.length]; }
function rng(s, min, max, salt=0) { return min + ((hash(s+salt) % (max-min+1)) + (max-min+1)) % (max-min+1); }

function buildPlayer(name) {
  return {
    name,
    pos:    pick(name, POSITIONS, 0),
    nation: pick(name, NATIONS,   1),
    league: pick(name, LEAGUES,   2),
    club:   pick(name, CLUBS,     3),
    stats:  STAT_KEYS.map((k,i) => ({ lbl:k, val: rng(name,62,93,i+10) })),
    pid:    100000 + (hash(name) % 200000),
  };
}

const ALL = DEFAULT_PLAYERS.map(buildPlayer);
let filtered = [...ALL];
document.getElementById("totalCount").textContent = ALL.length.toLocaleString("de");

function flagUrl(code) { return `https://flagcdn.com/w40/${code}.png`; }
function photoUrl(pid) { return `https://img.sofascore.com/api/v1/player/${pid}/image`; }

function shortName(name) {
  if (name.length <= 13) return name;
  const p = name.trim().split(" ");
  return p.length < 2 ? name : p[0][0] + ". " + p.slice(1).join(" ");
}

const SILHOUETTE_HTML = `<div class="card-photo-placeholder"><svg class="silhouette" viewBox="0 0 100 130" fill="white"><ellipse cx="50" cy="32" rx="22" ry="24"/><path d="M14 130 Q14 72 50 68 Q86 72 86 130Z"/></svg></div>`;

function makeCard(p) {
  const el = document.createElement("div");
  el.className = "player-card";
  el.innerHTML = `
    <div class="card-topleft">
      <div class="card-pos">${p.pos}</div>
    </div>
    <div class="card-topright">
      <img src="Logo.png" class="card-ufl-logo" alt="UFL" onerror="this.style.display='none'"/>
      <img src="${flagUrl(p.nation.code)}" class="card-flag" alt="${p.nation.name}" onerror="this.style.display='none'"/>
    </div>
    <div class="card-photo-wrap">
      <img class="card-photo" src="${photoUrl(p.pid)}" alt="${p.name}" loading="lazy"
           onerror="this.parentNode.innerHTML='${SILHOUETTE_HTML.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'')} <div class=card-photo-fade></div>'"/>
      <div class="card-photo-fade"></div>
    </div>
    <div class="card-bottom">
      <div class="card-divider"></div>
      <div class="card-name">${shortName(p.name)}</div>
      <div class="card-club">${p.club}</div>
      <div class="card-stats">
        ${p.stats.slice(0,3).map(s=>`<div><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`).join("")}
      </div>
    </div>`;
  el.addEventListener("click", () => openModal(p));
  return el;
}

function renderGrid() {
  const grid = document.getElementById("cardsGrid");
  document.getElementById("visibleCount").textContent = filtered.length.toLocaleString("de");
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results"><h3>Keine Spieler gefunden</h3><p>Anderen Suchbegriff probieren</p></div>`;
    return;
  }
  let i = 0;
  function chunk() {
    const frag = document.createDocumentFragment();
    const end = Math.min(i + 60, filtered.length);
    for (; i < end; i++) frag.appendChild(makeCard(filtered[i]));
    grid.appendChild(frag);
    if (i < filtered.length) requestAnimationFrame(chunk);
  }
  chunk();
}

window.filterCards = function() {
  const q   = document.getElementById("searchInput").value.toLowerCase();
  const pos = document.getElementById("posFilter").value;
  filtered = ALL.filter(p => (!q || p.name.toLowerCase().includes(q)) && (!pos || p.pos === pos));
  renderGrid();
};

window.openModal = function(p) {
  document.getElementById("modalBody").innerHTML = `
    <div class="modal-left">
      <div class="modal-card">
        <div class="card-topleft" style="position:absolute;top:10px;left:12px;z-index:3;">
          <div class="card-pos">${p.pos}</div>
        </div>
        <div class="card-topright" style="position:absolute;top:10px;right:11px;z-index:3;display:flex;flex-direction:column;align-items:center;gap:6px;">
          <img src="Logo.png" class="card-ufl-logo" onerror="this.style.display='none'"/>
          <img src="${flagUrl(p.nation.code)}" class="card-flag" onerror="this.style.display='none'"/>
        </div>
        <div class="card-photo-wrap" style="position:absolute;inset:0;z-index:1;overflow:hidden;">
          <img style="width:100%;height:88%;object-fit:cover;object-position:top center;display:block;"
               src="${photoUrl(p.pid)}" onerror="this.outerHTML='${SILHOUETTE_HTML.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'')}'"/>
          <div class="card-photo-fade"></div>
        </div>
        <div class="card-bottom" style="position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 10px 10px;text-align:center;">
          <div class="card-divider"></div>
          <div class="card-name">${shortName(p.name)}</div>
          <div class="card-club">${p.club}</div>
        </div>
      </div>
    </div>
    <div class="modal-right">
      <div class="modal-name">${p.name}</div>
      <div class="modal-sub">${p.pos} &nbsp;·&nbsp; ${p.club}</div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-lbl">Nation</div>
          <div class="info-val">
            <img class="info-flag" src="${flagUrl(p.nation.code)}" onerror="this.style.display='none'"/>
            ${p.nation.name}
          </div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Position</div>
          <div class="info-val">${p.pos}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Liga</div>
          <div class="info-val">${p.league}</div>
        </div>
        <div class="info-item">
          <div class="info-lbl">Verein</div>
          <div class="info-val">${p.club}</div>
        </div>
      </div>
      <div class="modal-stats">
        ${p.stats.map(s=>`<div class="modal-stat"><div class="modal-stat-val">${s.val}</div><div class="modal-stat-lbl">${s.lbl}</div></div>`).join("")}
      </div>
      <div class="modal-ufl-row">
        <img src="Logo.png" class="modal-ufl-logo" onerror="this.style.display='none'"/>
        <div class="modal-ufl-text"><strong>UFL Community Liga</strong>Verfügbar im Draft-Pool</div>
      </div>
    </div>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
};

window.handleOverlayClick = e => { if (e.target === document.getElementById("modalOverlay")) closeModal(); };
window.closeModal = () => { document.getElementById("modalOverlay").classList.remove("open"); document.body.style.overflow = ""; };
document.addEventListener("keydown", e => { if (e.key === "Escape") window.closeModal(); });

renderGrid();
</script>
</body>
</html>
