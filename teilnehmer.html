<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spieler-Profil – UFL Community Liga</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#00e676;--green-dark:#00b050;--black:#080b0e;--dark:#0f1318;
  --card:#141920;--border:#1e2530;--text:#dde5ef;--muted:#6b7585;
  --accent:#f0a500;--red:#f44336;--radius:12px;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:.2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E")}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;
  background:rgba(8,11,14,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,4vw,2.5rem);gap:1rem}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3vw,1.5rem);
  letter-spacing:.12em;color:var(--green);display:flex;align-items:center;gap:.4rem}
.nav-logo span{color:var(--text)}
.nav-back{display:inline-flex;align-items:center;gap:.5rem;
  font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:.38rem .8rem;border-radius:6px;border:1px solid var(--border);
  transition:color .2s,border-color .2s}
.nav-back:hover{color:var(--green);border-color:rgba(0,230,118,.3)}
.nav-back svg{transition:transform .2s}
.nav-back:hover svg{transform:translateX(-3px)}

/* HERO */
.hero{padding:calc(60px + clamp(2.5rem,6vw,4.5rem)) clamp(1rem,4vw,2rem) 0;
  max-width:860px;margin:0 auto}
.hero-card{background:linear-gradient(135deg,rgba(0,230,118,.07),rgba(0,180,80,.03));
  border:1px solid rgba(0,230,118,.18);border-radius:20px;
  padding:clamp(1.5rem,4vw,2.75rem);
  display:flex;align-items:center;gap:clamp(1.25rem,4vw,2.25rem);flex-wrap:wrap;
  position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 70% at 0% 0%,rgba(0,230,118,.06) 0%,transparent 60%)}
.hero-avatar{width:clamp(80px,14vw,120px);aspect-ratio:1;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green-dark),rgba(0,230,118,.32));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);color:var(--black);
  overflow:hidden;border:3px solid rgba(0,230,118,.25);position:relative;z-index:1}
.hero-avatar img{width:100%;height:100%;object-fit:cover}
.hero-info{position:relative;z-index:1;flex:1;min-width:200px}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,8vw,3.5rem);
  letter-spacing:.06em;line-height:.95;margin-bottom:.5rem}
.hero-team{display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);
  border-radius:100px;padding:.3rem .9rem;
  font-size:clamp(.72rem,1.5vw,.82rem);font-weight:700;color:var(--green);letter-spacing:.07em}
.hero-team-dot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0}
.hero-pts{position:absolute;top:clamp(1rem,3vw,1.75rem);right:clamp(1rem,3vw,1.75rem);
  text-align:center;background:rgba(0,0,0,.3);border:1px solid var(--border);
  border-radius:12px;padding:.75rem 1.1rem;z-index:1}
.hero-pts-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3rem);
  color:var(--accent);line-height:1}
.hero-pts-lbl{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:clamp(1.5rem,4vw,2.5rem) clamp(1rem,4vw,2rem) 4rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(.85rem,2.5vw,1.25rem)}
@media(max-width:560px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(1rem,3vw,1.5rem)}
.card+.card,.grid-2+*,.card-full{margin-top:clamp(.85rem,2.5vw,1.25rem)}
.card-full{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:clamp(1rem,3vw,1.5rem)}
.section-lbl{font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--green);margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
.section-lbl::before{content:'';display:block;width:14px;height:2px;background:var(--green)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem}
@media(max-width:400px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--dark);border:1px solid var(--border);border-radius:10px;
  padding:clamp(.7rem,2vw,1rem) .5rem;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,4vw,2.1rem);
  line-height:1;margin-bottom:.25rem;color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-val.gold{color:var(--accent)}
.stat-val.muted{color:var(--text)}
.stat-lbl{font-size:clamp(.55rem,.75vw,.63rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

/* FORM */
.form-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.form-box{width:clamp(28px,5vw,36px);height:clamp(28px,5vw,36px);border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(.62rem,.9vw,.72rem);font-weight:700;letter-spacing:.04em;flex-shrink:0}
.form-box.w{background:var(--green);color:var(--black)}
.form-box.d{background:var(--accent);color:var(--black)}
.form-box.l{background:var(--red);color:#fff}
.form-none{font-size:.85rem;color:var(--muted)}

/* MATCHES */
.match-list{display:flex;flex-direction:column;gap:.45rem}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  background:var(--dark);border:1px solid var(--border);border-radius:9px;
  padding:clamp(.5rem,1.8vw,.72rem) clamp(.65rem,2vw,.95rem);gap:.6rem;
  border-left:3px solid var(--border);transition:border-color .15s}
.match-row.win {border-left-color:var(--green)}
.match-row.loss{border-left-color:var(--red)}
.match-row.draw{border-left-color:var(--accent)}
.match-row:hover{background:rgba(255,255,255,.02)}
.m-home{text-align:right;font-weight:600;font-size:clamp(.76rem,1.8vw,.88rem)}
.m-away{text-align:left;font-weight:600;font-size:clamp(.76rem,1.8vw,.88rem)}
.m-home.me,.m-away.me{color:var(--green)}
.m-score{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:.2rem .6rem;font-family:'Bebas Neue',sans-serif;
  font-size:clamp(.9rem,2.2vw,1.1rem);color:var(--text);
  min-width:48px;text-align:center;letter-spacing:.06em;flex-shrink:0}
.m-day{font-size:.6rem;color:var(--muted);text-align:center;margin-top:.22rem;letter-spacing:.08em}
.match-empty{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.88rem}
.match-empty span{font-size:2rem;display:block;margin-bottom:.5rem}

/* NAV PLAYERS */
.nav-players{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:clamp(1rem,3vw,1.5rem)}
.nav-player-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:.4rem .85rem;font-size:.75rem;font-weight:700;cursor:pointer;
  transition:border-color .2s,color .2s;color:var(--muted);letter-spacing:.05em}
.nav-player-btn:hover{border-color:rgba(0,230,118,.3);color:var(--green)}
.nav-player-btn.active{border-color:var(--green);color:var(--green);background:rgba(0,230,118,.07)}

/* NOT FOUND */
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;text-align:center;gap:1rem;padding:2rem}
.not-found h2{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--muted);letter-spacing:.1em}
.not-found p{color:var(--muted);font-size:.9rem}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh}
.loading-dot{width:10px;height:10px;background:var(--green);border-radius:50%;
  animation:pulse 1.4s infinite;margin:0 4px}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:1.5rem clamp(1rem,4vw,2rem);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
  max-width:860px;margin:0 auto}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--green)}
.footer-logo span{color:var(--muted)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-logo">⚽ UFL <span>Liga</span></a>
  <a href="index.html#teilnehmer" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Alle Teilnehmer
  </a>
</nav>

<!-- CONTENT -->
<div id="page-content">
  <div class="loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
</div>

<footer>
  <div class="footer-logo">⚽ UFL <span>Community Liga</span></div>
  <span style="font-size:.72rem;color:var(--muted)">© 2025 UFL Community Liga</span>
</footer>

<script>
// ══════════════════════════════════════
//  DATEN aus localStorage (wie index.html)
// ══════════════════════════════════════
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}

const defaultPlayers = [
  {id:1,name:'BennyBroKenobi',team:''},
  {id:2,name:'DatSeb',team:''},
  {id:3,name:'AGE_Kevin',team:''},
  {id:4,name:'Kira',team:''},
  {id:5,name:'Askeladd',team:''},
  {id:6,name:'Virent',team:''},
  {id:7,name:'Scr1p',team:''},
];

let players  = load('ufl_players', defaultPlayers);
let schedule = load('ufl_schedule', []);

// ══════════════════════════════════════
//  SPIELER-ID aus URL
// ══════════════════════════════════════
function getPlayerId(){
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  return isNaN(id) ? null : id;
}

// ══════════════════════════════════════
//  STATISTIKEN berechnen
// ══════════════════════════════════════
function calcStats(playerId){
  const myMatches = schedule.filter(m => m.played && (m.home===playerId || m.away===playerId));
  let wins=0, draws=0, losses=0, gf=0, ga=0, form=[];
  myMatches.forEach(m => {
    const isHome = m.home === playerId;
    const myG  = isHome ? +m.homeGoals : +m.awayGoals;
    const oppG = isHome ? +m.awayGoals : +m.homeGoals;
    gf += myG; ga += oppG;
    if(myG > oppG)     { wins++;   form.push('w'); }
    else if(myG < oppG){ losses++; form.push('l'); }
    else               { draws++;  form.push('d'); }
  });
  return { wins, draws, losses, gf, ga, form,
    pts: wins*3 + draws,
    diff: gf - ga,
    played: myMatches.length,
    matches: myMatches
  };
}

// ══════════════════════════════════════
//  SEITE RENDERN
// ══════════════════════════════════════
function renderPage(playerId){
  const p = players.find(x => x.id === playerId);
  if(!p){ renderNotFound(); return; }

  const pMap = {};
  players.forEach(x => pMap[x.id] = x);

  const st = calcStats(p.id);
  const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // Avatar
  const avatarHTML = p.avatar
    ? `<img src="${p.avatar}" alt="${p.name}" onerror="this.parentElement.innerHTML='${init}'">`
    : init;

  // Form letzte 5
  const last5 = st.form.slice(-5);
  const formHTML = last5.length
    ? last5.map(f => {
        const lbl = f==='w'?'S': f==='d'?'U':'N';
        return `<span class="form-box ${f}">${lbl}</span>`;
      }).join('')
    : '<span class="form-none">Noch keine Spiele gespielt</span>';

  // Bisherige Spiele (neueste zuerst)
  const matchRows = [...st.matches].reverse().map(m => {
    const isHome = m.home === p.id;
    const myG    = isHome ? m.homeGoals : m.awayGoals;
    const oppG   = isHome ? m.awayGoals : m.homeGoals;
    const opp    = pMap[isHome ? m.away : m.home]?.name || '?';
    const res    = +myG > +oppG ? 'win' : +myG < +oppG ? 'loss' : 'draw';
    const homeLbl = isHome ? `<span class="m-home me">${p.name}</span>` : `<span class="m-home">${opp}</span>`;
    const awayLbl = isHome ? `<span class="m-away">${opp}</span>`       : `<span class="m-away me">${p.name}</span>`;
    const scoreDisp = isHome ? `${myG}–${oppG}` : `${oppG}–${myG}`;
    return `<div class="match-row ${res}">
      ${homeLbl}
      <div style="text-align:center">
        <div class="m-score">${scoreDisp}</div>
        <div class="m-day">Spieltag ${m.matchday}</div>
      </div>
      ${awayLbl}
    </div>`;
  }).join('');

  // Spieler-Navigation (andere Spieler)
  const playerNav = players.map(x => {
    const isActive = x.id === p.id ? ' active' : '';
    return `<button class="nav-player-btn${isActive}" onclick="goToPlayer(${x.id})">${x.name}</button>`;
  }).join('');

  // Titelzeile
  document.title = `${p.name} – UFL Community Liga`;

  document.getElementById('page-content').innerHTML = `
    <!-- HERO -->
    <div class="hero">
      <div class="nav-players">${playerNav}</div>
      <div class="hero-card">
        <div class="hero-avatar">${avatarHTML}</div>
        <div class="hero-info">
          <div class="hero-name">${p.name}</div>
          ${p.team && p.team !== '—' ? `
          <div class="hero-team">
            <span class="hero-team-dot"></span>${p.team}
          </div>` : ''}
        </div>
        <div class="hero-pts">
          <div class="hero-pts-val">${st.pts}</div>
          <div class="hero-pts-lbl">Punkte</div>
        </div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- Statistiken -->
      <div class="card-full">
        <div class="section-lbl">Saison-Statistiken</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-val">${st.wins}</div><div class="stat-lbl">Siege</div></div>
          <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${st.draws}</div><div class="stat-lbl">Unentsch.</div></div>
          <div class="stat-box"><div class="stat-val red">${st.losses}</div><div class="stat-lbl">Niederlagen</div></div>
          <div class="stat-box"><div class="stat-val muted">${st.played}</div><div class="stat-lbl">Spiele</div></div>
          <div class="stat-box"><div class="stat-val">${st.gf}</div><div class="stat-lbl">Tore</div></div>
          <div class="stat-box"><div class="stat-val red">${st.ga}</div><div class="stat-lbl">Gegentore</div></div>
          <div class="stat-box">
            <div class="stat-val" style="color:${st.diff>=0?'var(--green)':'var(--red)'}">
              ${st.diff>0?'+':''}${st.diff}
            </div>
            <div class="stat-lbl">Differenz</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:${st.played>0?Math.round(st.wins/st.played*100)>=50?'var(--green)':'var(--red)':'var(--muted)'}">
              ${st.played > 0 ? Math.round(st.wins/st.played*100)+'%' : '–'}
            </div>
            <div class="stat-lbl">Siegquote</div>
          </div>
        </div>
      </div>

      <!-- Form & Team -->
      <div class="grid-2">
        <div class="card">
          <div class="section-lbl">Letzte 5 Spiele</div>
          <div class="form-row">${formHTML}</div>
        </div>
        <div class="card">
          <div class="section-lbl">Lieblings-Team</div>
          ${p.team && p.team !== '—'
            ? `<div style="display:flex;align-items:center;gap:.6rem">
                <span style="width:8px;height:8px;background:var(--green);border-radius:50%;flex-shrink:0;display:block"></span>
                <span style="font-weight:700;font-size:1rem">${p.team}</span>
               </div>`
            : `<span style="color:var(--muted);font-size:.85rem">Noch kein Team eingetragen</span>`}
        </div>
      </div>

      <!-- Bisherige Spiele -->
      <div class="card-full">
        <div class="section-lbl">Bisherige Spiele (${st.matches.length})</div>
        <div class="match-list">
          ${matchRows || '<div class="match-empty"><span>⚽</span>Noch keine Spiele ausgetragen.</div>'}
        </div>
      </div>

    </div>
  `;
}

function renderNotFound(){
  // Zeige alle Spieler als Übersicht wenn keine ID
  const cards = players.map(p => {
    const init = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const av = p.avatar
      ? `<img src="${p.avatar}" style="width:100%;height:100%;object-fit:cover">`
      : init;
    return `<a href="teilnehmer.html?id=${p.id}" style="
      display:flex;flex-direction:column;align-items:center;gap:.6rem;
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:1.25rem 1rem;text-align:center;cursor:pointer;
      transition:border-color .2s,transform .2s;text-decoration:none;color:inherit"
      onmouseover="this.style.borderColor='rgba(0,230,118,.32)';this.style.transform='translateY(-3px)'"
      onmouseout="this.style.borderColor='';this.style.transform=''">
      <div style="width:54px;height:54px;border-radius:50%;overflow:hidden;
        background:linear-gradient(135deg,var(--green-dark),rgba(0,230,118,.28));
        display:flex;align-items:center;justify-content:center;
        font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--black)">${av}</div>
      <div style="font-weight:700;font-size:.9rem">${p.name}</div>
      ${p.team && p.team!=='—' ? `<div style="font-size:.72rem;color:var(--muted)">${p.team}</div>` : ''}
    </a>`;
  }).join('');

  document.title = 'Teilnehmer – UFL Community Liga';
  document.getElementById('page-content').innerHTML = `
    <div style="max-width:860px;margin:0 auto;padding:calc(60px + 2.5rem) clamp(1rem,4vw,2rem) 4rem">
      <p style="font-size:.67rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--green);
        margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem">
        <span style="display:block;width:14px;height:2px;background:var(--green)"></span>Saison 2025
      </p>
      <h1 style="font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,5vw,2.9rem);
        font-weight:900;text-transform:uppercase;margin-bottom:1.5rem">Alle Teilnehmer</h1>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.85rem">
        ${cards}
      </div>
    </div>`;
}

function goToPlayer(id){
  window.location.href = 'teilnehmer.html?id=' + id;
}

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
const playerId = getPlayerId();
if(playerId !== null){
  renderPage(playerId);
} else {
  renderNotFound();
}
</script>
</body>
</html>
